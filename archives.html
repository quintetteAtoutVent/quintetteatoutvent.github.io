<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mémoire Musicale — Quintette Atout Vent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #2a7f7f; --accent: #5bb8b8; --dark: #0f1c20;
      --light: #fdfdfd; --white: #ffffff; --gray: #64748b;
      --gold: #c5a47e; --cubic: cubic-bezier(0.23, 1, 0.32, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: var(--white); color: var(--dark); line-height: 1.6; overflow-x: hidden; }
    nav { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: rgba(15, 28, 32, 0.96); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .logo { font-family: 'Cormorant Garamond', serif; color: var(--accent); text-decoration: none; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; font-size: 1rem; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: white; text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; transition: 0.3s; }
    .transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--teal); z-index: 10000; transform: translateY(100%); pointer-events: none; }
    #hero { height: 35vh; min-height: 250px; margin-top: 60px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background-color: #0c1417; }
    #particles-js { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .hero-content { position: relative; z-index: 2; color: white; text-align: center; pointer-events: none; }
    .si { max-width: 1200px; margin: 0 auto; padding: 4rem 5%; }
    .concerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 4rem; }
    .concert-card { background: var(--white); position: relative; display: flex; flex-direction: column; cursor: pointer; }
    .img-box { position: relative; height: 380px; overflow: hidden; background: var(--dark); }
    .concert-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s var(--cubic); }
    .concert-card:hover .concert-card-img { transform: scale(1.05); opacity: 0.8; }
    .concert-card-body { padding: 2rem 0; }
    .title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--dark); font-weight: 500; }
    #lightbox { position: fixed; inset: 0; background: rgba(8, 14, 16, 0.98); z-index: 11000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    #lightbox img { max-width: 90%; max-height: 85vh; transform: scale(0.95); transition: transform 0.4s var(--cubic); }
    #lightbox.active { display: flex; }
    #lightbox.active img { transform: scale(1); }
    footer { background: #0c1417; color: rgba(255,255,255,0.3); text-align: center; padding: 4rem 2rem; font-size: 0.7rem; }
  </style>
</head>
<body data-barba="wrapper">
  <div class="transition-overlay"></div>
  <nav>
    <a href="index.html" class="logo">Atout Vent</a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="index.html#agenda">Agenda</a></li>
    </ul>
  </nav>

  <main data-barba="container" data-barba-namespace="archives">
    <header id="hero">
      <canvas id="particles-js"></canvas>
      <div class="hero-content"><h1>Concerts Passés</h1></div>
    </header>

    <div class="si">
      <div class="concerts-grid">
        <article class="concert-card" onclick="openLightbox('https://raw.githubusercontent.com/atoutvent76-ux/quintette-atout-vent/main/concert%20pierre%20et%20le%20loup.jpg')">
          <div class="img-box"><img src="https://raw.githubusercontent.com/atoutvent76-ux/quintette-atout-vent/main/concert%20pierre%20et%20le%20loup.jpg" class="concert-card-img" alt="Pierre et le loup"></div>
          <div class="concert-card-body"><h2 class="title">Pierre et le Loup</h2></div>
        </article>
      </div>
    </div>
    <footer>© 2026 Quintette Atout Vent</footer>
  </main>

  <div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>

  <script src="https://unpkg.com/@barba/core"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    (function() {
      "use strict";
      const initParticles = () => {
        const canvas = document.getElementById('particles-js');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth, h = canvas.height = canvas.parentNode.offsetHeight;
        let pArr = Array.from({length: 60}, () => ({x: Math.random()*w, y: Math.random()*h, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, s: Math.random()*1.2}));
        const render = () => {
          ctx.clearRect(0,0,w,h);
          pArr.forEach(p => { p.x += p.vx; p.y += p.vy; if(p.x<0||p.x>w||p.y<0||p.y>h) { p.x=Math.random()*w; p.y=Math.random()*h; } ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fillStyle = 'rgba(91, 184, 184, 0.4)'; ctx.fill(); });
          requestAnimationFrame(render);
        };
        render();
      };
      window.openLightbox = (u) => { document.getElementById('lightbox-img').src = u; const lb = document.getElementById('lightbox'); lb.style.display = 'flex'; setTimeout(() => lb.classList.add('active'), 10); };
      window.closeLightbox = () => { const lb = document.getElementById('lightbox'); lb.classList.remove('active'); setTimeout(() => lb.style.display = 'none', 400); };

      barba.init({
        transitions: [{
          name: 'emeraude',
          async leave() { await gsap.to('.transition-overlay', { duration: 0.6, translateY: '0%', ease: 'power2.inOut' }); },
          async enter() { window.scrollTo(0,0); initParticles(); await gsap.to('.transition-overlay', { duration: 0.6, translateY: '-100%', ease: 'power2.inOut' }); }
        }]
      });
      initParticles();
    })();
  </script>
</body>
</html>
