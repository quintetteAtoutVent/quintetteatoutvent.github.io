<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2d4a">
  <meta name="description" content="Revue de presse du Quintette Atout Vent — ensemble de musique de chambre au Havre.">
  <title>Échos Médiatiques — Quintette Atout Vent</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --teal:#2d4f72;--teal2:#1a2d4a;--white:#f8fafb;--dark:#0f1c2e;
      --gold:#c9a96e;--cubic:cubic-bezier(0.23,1,0.32,1);
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Montserrat',sans-serif;background:var(--white);color:var(--dark);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

    /* CURSEUR PREMIUM */
    @media (hover:hover) and (pointer:fine){
      *{cursor:none !important;}
      #cursor-arrow,#cursor-hand{position:fixed;pointer-events:none;z-index:99999;width:24px;height:28px;top:0;left:0;will-change:left,top;}
      #cursor-hand{display:none;}
    }

    /* NAVIGATION GLASSMORPHISM */
    nav{
      position:fixed;top:0;width:100%;z-index:1000;
      display:flex;justify-content:space-between;align-items:center;
      padding:1rem 5%;
      background:rgba(15,28,46,0.88);
      backdrop-filter:blur(18px) saturate(1.4);
      border-bottom:1px solid rgba(255,255,255,0.08);
      transition:background .4s;
    }
    .logo{display:flex;align-items:center;gap:.6rem;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:rgba(255,255,255,0.92);letter-spacing:3px;text-transform:uppercase;text-decoration:none;}
    .logo-text span{display:block;font-size:.62rem;letter-spacing:6px;font-weight:300;color:var(--gold);opacity:.8;}
    .nav-links{display:flex;gap:1.8rem;list-style:none;}
    .nav-links a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;transition:color .3s;position:relative;padding-bottom:3px;}
    .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .35s var(--cubic);}
    .nav-links a:hover{color:#fff;}.nav-links a:hover::after{width:100%;}

    /* HERO SECTION AVEC PARTICULES */
    #hero{
      min-height:52vh;padding-top:80px;padding-bottom:3rem;
      display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .hero-bg{position:absolute;inset:0;background:linear-gradient(145deg,#0f1c2e 0%,#162844 40%,#1e3a5a 75%,#243f65 100%);}
    canvas#particles-js{position:absolute;inset:0;z-index:2;pointer-events:none;}
    .hero-content{position:relative;z-index:3;text-align:center;padding:0 2rem;animation:heroFade 1.2s var(--cubic) .2s both;}
    @keyframes heroFade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .hero-orn{display:flex;align-items:center;justify-content:center;gap:.8rem;margin-bottom:1.5rem;}
    .hero-orn-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
    .hero-orn-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);}
    .hero-tag{font-size:.72rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;}
    #hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,6.5vw,4.5rem);font-weight:300;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.92);line-height:1.05;}
    #hero h1 strong{font-weight:600;color:#fff;display:block;}
    #hero h1 em{font-style:italic;font-weight:300;color:var(--gold);font-size:.75em;letter-spacing:10px;display:block;margin-top:.4rem;}

    /* GRILLE D'ARTICLES */
    .si{max-width:1200px;margin:0 auto;padding:5rem 5%;}
    .s-header{margin-bottom:4rem;}
    .s-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:600;color:var(--teal2);margin-bottom:1rem;}
    .press-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(360px,100%),1fr));gap:3rem;}
    
    .reveal{opacity:0;transform:translateY(40px);transition:opacity .9s var(--cubic),transform .9s var(--cubic);}
    .reveal.active{opacity:1;transform:translateY(0);}

    .press-card{background:#fff;position:relative;display:flex;flex-direction:column;cursor:pointer;border:1px solid rgba(45,79,114,0.1);overflow:hidden;transition:all .5s var(--cubic);}
    .press-card:hover{box-shadow:0 30px 70px rgba(26,45,74,0.16);transform:translateY(-4px);border-color:rgba(201,169,110,0.3);}

    .img-box{position:relative;overflow:hidden;background:var(--dark);height:420px;display:flex;align-items:center;justify-content:center;}
    .press-img{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .6s, transform 1.2s var(--cubic);}
    .press-img.visible{opacity:1;}
    .press-card:hover .press-img{transform:scale(1.03);}
    
    .img-zoom-hint{position:absolute;bottom:1rem;right:1rem;z-index:3;width:34px;height:34px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:all .4s var(--cubic);backdrop-filter:blur(6px);}
    .press-card:hover .img-zoom-hint{opacity:1;transform:scale(1);}

    .press-card-body{padding:1.8rem 2rem 2.2rem;flex:1;}
    .press-date{font-size:.62rem;color:var(--gold);letter-spacing:4px;font-weight:600;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;text-transform:uppercase;}
    .press-date::before{content:'';width:20px;height:1px;background:var(--gold);}
    .press-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--teal2);font-weight:600;line-height:1.08;}

    /* LIGHTBOX */
    #lightbox{position:fixed;inset:0;background:rgba(8,16,28,0.97);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(16px);}
    #lightbox.active{display:flex;}
    #lightbox img{max-width:88vw;max-height:86vh;transform:scale(0.92);opacity:0;transition:all 0.5s var(--cubic);box-shadow:0 40px 100px rgba(0,0,0,0.6);}
    #lightbox.loaded img{transform:scale(1);opacity:1;}
    .lb-close{position:absolute;top:1.2rem;right:1.5rem;background:none;border:1px solid rgba(201,169,110,0.3);color:var(--gold);width:40px;height:40px;cursor:pointer;transition:all .25s;}
    .lb-close:hover{transform:rotate(90deg);border-color:var(--gold);}

    footer{background:var(--dark);color:rgba(232,237,242,0.35);text-align:center;padding:2.5rem 2rem;font-size:.68rem;border-top:1px solid rgba(201,169,110,0.1);}
  </style>
</head>
<body>

<svg id="cursor-arrow" viewBox="0 0 20 24" fill="none"><path d="M2 2L2 20L7.5 14.5L11 21L13.5 20L10 13.5L17 13.5L2 2Z" fill="#c9a96e" stroke="#1a2d4a"/></svg>
<svg id="cursor-hand" viewBox="0 0 24 28" fill="none"><path d="M8 12V4a2 2 0 0 1 4 0v8" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/><path d="M12 12V9a2 2 0 0 1 4 0v3" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/><path d="M16 12v-1a2 2 0 0 1 4 0v5c0 4-3 7-7 7H9a7 7 0 0 1-7-7v-3a2 2 0 0 1 4 0" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/></svg>

<nav id="main-nav">
  <a href="index.html" class="logo"><div class="logo-text">ATOUT VENT<span>QUINTETTE</span></div></a>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="archives.html">Archives</a></li>
    <li><a href="presse.html" style="color:#fff;">Presse</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-bg"></div>
  <canvas id="particles-js"></canvas>
  <div class="hero-content">
    <div class="hero-orn"><div class="hero-orn-line"></div><div class="hero-orn-diamond"></div><div class="hero-orn-line"></div></div>
    <div class="hero-tag">Revue de Presse</div>
    <h1><strong>Échos</strong> <em>Médiatiques</em></h1>
  </div>
</section>

<section class="si">
  <div class="s-header reveal">
    <h2 class="s-title">Articles & Critiques</h2>
  </div>

  <div class="press-grid">
    <article class="press-card reveal" data-img="concert pierre et le loup.jpg" data-title="Ouest France - 2024">
      <div class="img-box">
        <img class="press-img" src="concert pierre et le loup.jpg" alt="Article Presse">
        <div class="img-zoom-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
      </div>
      <div class="press-card-body">
        <div class="press-date">Septembre 2024</div>
        <h3 class="press-title">Le souffle magistral d'Atout Vent</h3>
      </div>
    </article>

    <article class="press-card reveal" data-img="Affiche abbaye.png" data-title="Saison Musicale - Abbaye">
      <div class="img-box">
        <img class="press-img" src="Affiche abbaye.png" alt="Affiche Concert">
        <div class="img-zoom-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
      </div>
      <div class="press-card-body">
        <div class="press-date">Juin 2025</div>
        <h3 class="press-title">Résonances à l'Abbaye</h3>
      </div>
    </article>
  </div>
</section>

<div id="lightbox">
  <button class="lb-close">×</button>
  <div id="lb-content"><img id="lb-img" src=""><div id="lb-title" style="color:white;text-align:center;margin-top:1rem;font-family:'Cormorant Garamond';letter-spacing:2px;"></div></div>
</div>

<footer><p>© 2026 Quintette Atout Vent — Design Industrial Premium</p></footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
  /* INITIALISATION PARTICULES (Comme dans Archives) */
  particlesJS("particles-js", {
    "particles": {
      "number": { "value": 50 },
      "color": { "value": "#c9a96e" },
      "opacity": { "value": 0.3 },
      "size": { "value": 2 },
      "line_linked": { "enable": true, "distance": 150, "color": "#c9a96e", "opacity": 0.1 },
      "move": { "enable": true, "speed": 1 }
    }
  });

  /* GESTION LIGHTBOX & REVEAL */
  const cards = document.querySelectorAll('.press-card');
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbTit = document.getElementById('lb-title');

  cards.forEach(card => {
    const img = card.querySelector('.press-img');
    img.onload = () => img.classList.add('visible');
    if(img.complete) img.classList.add('visible');

    card.addEventListener('click', () => {
      lbImg.src = card.dataset.img;
      lbTit.textContent = card.dataset.title;
      lb.style.display = 'flex';
      setTimeout(() => lb.classList.add('active'), 10);
      document.body.style.overflow = 'hidden';
    });
  });

  lbImg.onload = () => lb.classList.add('loaded');
  document.querySelector('.lb-close').addEventListener('click', () => {
    lb.classList.remove('active', 'loaded');
    setTimeout(() => { lb.style.display = 'none'; lbImg.src = ''; }, 400);
    document.body.style.overflow = '';
  });

  /* CURSEUR & REVEAL ON SCROLL */
  const arrow = document.getElementById('cursor-arrow');
  const hand = document.getElementById('cursor-hand');
  window.addEventListener('mousemove', e => {
    const t = e.target.closest('a, button, .press-card');
    arrow.style.display = t ? 'none' : 'block';
    hand.style.display = t ? 'block' : 'none';
    const c = t ? hand : arrow;
    c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
  });

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
  }, {threshold: 0.1});
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
</body>
</html>
