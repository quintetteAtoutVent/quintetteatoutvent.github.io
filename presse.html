<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presse | Quintette Atout Vent</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --teal:#2d4f72;--teal2:#1a2d4a;--white:#f8fafb;--dark:#0f1c2e;
            --gold:#c9a96e;--cubic:cubic-bezier(0.23,1,0.32,1);
        }
        body{font-family:'Montserrat',sans-serif;background:var(--white);color:var(--dark);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

        /* CURSEUR DYNAMIQUE (Identique à Archives) */
        @media (hover:hover) and (pointer:fine){
            *{cursor:none !important;}
            #cursor-arrow,#cursor-hand{position:fixed;pointer-events:none;z-index:99999;width:24px;height:28px;top:0;left:0;will-change:left,top;}
            #cursor-hand{display:none;}
        }

        /* NAVIGATION PREMIUM */
        nav{
            position:fixed;top:0;width:100%;z-index:1000;
            display:flex;justify-content:space-between;align-items:center;
            padding:1rem 5%;
            background:rgba(15, 28, 46, 0.88);
            backdrop-filter:blur(18px) saturate(1.4);
            border-bottom:1px solid rgba(255, 255, 255, 0.08);
        }
        .logo{display:flex;align-items:center;gap:.6rem;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:rgba(255,255,255,0.92);letter-spacing:3px;text-transform:uppercase;text-decoration:none;}
        .logo span{display:block;font-size:.62rem;letter-spacing:6px;font-weight:300;color:var(--gold);opacity:.8;}
        .nav-links{display:flex;gap:1.8rem;list-style:none;}
        .nav-links a{color:rgba(255, 255, 255, 0.7);text-decoration:none;font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;transition:color 0.3s;}
        .nav-links a:hover{color:#fff;}

        /* HERO AVEC PARTICULES FONCTIONNELLES */
        #hero{
            min-height:50vh;padding-top:80px;
            display:flex;align-items:center;justify-content:center;
            position:relative;overflow:hidden;
        }
        .hero-bg{position:absolute;inset:0;background:linear-gradient(145deg, var(--dark) 0%, var(--teal2) 100%);}
        canvas#particles-js{position:absolute;inset:0;z-index:2;pointer-events:none;}
        .hero-content{position:relative;z-index:3;text-align:center;animation:heroFade 1.2s var(--cubic) both;}
        @keyframes heroFade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        #hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem, 6vw, 4.5rem);font-weight:300;letter-spacing:8px;text-transform:uppercase;color:#fff;}
        #hero h1 strong{font-weight:600;display:block;}

        /* SECTION ARTICLES */
        .press-section{max-width:1200px;margin:0 auto;padding:5rem 5%;}
        .press-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));gap:3rem;}
        
        .press-card{
            background:#fff;position:relative;cursor:pointer;
            border:1px solid rgba(45, 79, 114, 0.1);overflow:hidden;
            transition:all 0.5s var(--cubic);
        }
        .press-card:hover{transform:translateY(-8px);box-shadow:0 30px 60px rgba(15, 28, 46, 0.15);border-color:var(--gold);}

        .img-box{height:400px;background:var(--dark);overflow:hidden;}
        
        /* EFFET GRISÉ ET RÉVÉLATION AU SURVOL */
        .press-img{
            width:100%;height:100%;object-fit:contain;
            filter: grayscale(100%);
            transition: filter 0.8s var(--cubic), transform 1.2s var(--cubic);
        }
        .press-card:hover .press-img{
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .press-body{padding:2rem;}
        .press-date{font-size:.6rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:.5rem;display:block;}
        .press-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--teal2);font-weight:600;line-height:1.1;}

        /* LIGHTBOX PREMIUM */
        #lightbox{
            position:fixed;inset:0;background:rgba(8, 16, 28, 0.98);
            z-index:2000;display:none;align-items:center;justify-content:center;
            backdrop-filter:blur(15px);
        }
        #lightbox.active{display:flex;}
        #lightbox img{max-width:90vw;max-height:85vh;box-shadow:0 0 50px rgba(0,0,0,0.5); border: 1px solid var(--gold);}
        .close-lb{position:absolute;top:20px;right:30px;color:var(--gold);font-size:3rem;cursor:pointer;}

        footer{background:var(--dark);color:rgba(255, 255, 255, 0.3);text-align:center;padding:3rem;font-size:0.7rem;letter-spacing:2px;border-top: 1px solid rgba(201, 169, 110, 0.1);}
    </style>
</head>
<body>

    <svg id="cursor-arrow" viewBox="0 0 20 24" fill="none"><path d="M2 2L2 20L7.5 14.5L11 21L13.5 20L10 13.5L17 13.5L2 2Z" fill="#c9aa6e" stroke="#1a2d4a"/></svg>
    <svg id="cursor-hand" viewBox="0 0 24 28" fill="none"><path d="M8 12V4a2 2 0 0 1 4 0v8" stroke="#c9aa6e" stroke-width="1.5" stroke-linecap="round"/><path d="M12 12V9a2 2 0 0 1 4 0v3" stroke="#c9aa6e" stroke-width="1.5" stroke-linecap="round"/><path d="M16 12v-1a2 2 0 0 1 4 0v5c0 4-3 7-7 7H9a7 7 0 0 1-7-7v-3a2 2 0 0 1 4 0" stroke="#c9aa6e" stroke-width="1.5" stroke-linecap="round"/></svg>

    <nav>
        <a href="index.html" class="logo">ATOUT VENT<span>QUINTETTE</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="archives.html">Archives</a></li>
            <li><a href="presse.html" style="color:white">Presse</a></li>
        </ul>
    </nav>

    <header id="hero">
        <div class="hero-bg"></div>
        <canvas id="particles-js"></canvas>
        <div class="hero-content">
            <h1><strong>Revue</strong> de Presse</h1>
        </div>
    </header>

    <section class="press-section">
        
            <article class="press-card" onclick="openLB('IMG_20260415_0003.jpg')">
                <div class="img-box">
                    <img src="IMG_20260415_0003.jpg" class="press-img" alt="Nouvel Article">
                </div>
                <div class="press-body">
                    <span class="press-date">Avril 2026</span>
                    <h3 class="press-title">Échos de la Saison Normande</h3>
                </div>
            </article>
        </div>
    </section>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <span class="close-lb">&times;</span>
        <img id="lb-img" src="">
    </div>

    <footer><p>© 2026 QUINTETTE ATOUT VENT | INDUSTRIAL PREMIUM</p></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Initialisation des particules (Même configuration que Archives)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#c9a96e" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c9a96e", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        // Fonction Lightbox
        function openLB(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lb-img').src = src;
            lb.classList.add('active');
        }

        // Gestion du curseur dynamique
        const arrow = document.getElementById('cursor-arrow');
        const hand = document.getElementById('cursor-hand');
        window.addEventListener('mousemove', e => {
            const t = e.target.closest('a, button, .press-card');
            arrow.style.display = t ? 'none' : 'block';
            hand.style.display = t ? 'block' : 'none';
            const cur = t ? hand : arrow;
            cur.style.left = e.clientX + 'px';
            cur.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
