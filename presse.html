<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Presse | Quintette Atout Vent</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --teal: #2d4f72;
            --teal2: #1a2d4a;
            --white: #f8fafb;
            --dark: #0f1c2e;
            --gold: #c9a96e;
            --cubic: cubic-bezier(0.23, 1, 0.32, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--white);
            color: var(--dark);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* NAVIGATION - INDUSTRIAL PREMIUM */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%;
            background: rgba(15, 28, 46, 0.88);
            backdrop-filter: blur(18px) saturate(1.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            display: flex; align-items: center; gap: 0.6rem;
            text-decoration: none; font-family: 'Cormorant Garamond', serif;
            color: #fff; letter-spacing: 2px; text-transform: uppercase;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7); text-decoration: none;
            font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
            transition: color 0.3s; position: relative;
        }
        .nav-links a:hover { color: var(--gold); }

        /* HERO - REPRODUCTION ARCHIVES AVEC PARTICULES */
        #hero {
            height: 55vh;
            background: linear-gradient(145deg, var(--dark) 0%, var(--teal2) 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        canvas#particles-js { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        .hero-content {
            position: relative; z-index: 2; text-align: center;
            animation: heroFade 1.2s var(--cubic);
        }

        @keyframes heroFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero-content h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: rgba(255, 255, 255, 0.92); font-weight: 300; letter-spacing: 8px; text-transform: uppercase;
        }

        .hero-content span {
            color: var(--gold); display: block; font-size: 0.8rem;
            letter-spacing: 5px; margin-top: 15px; font-weight: 400;
        }

        /* GRILLE DE PRESSE */
        .press-grid {
            max-width: 1200px; margin: -60px auto 5rem;
            padding: 0 5%; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 3rem; position: relative; z-index: 5;
        }

        .press-card {
            background: #fff; border: 1px solid rgba(45, 79, 114, 0.1);
            transition: transform 0.5s var(--cubic), box-shadow 0.5s var(--cubic);
            display: flex; flex-direction: column; cursor: pointer;
            overflow: hidden;
        }

        .press-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 70px rgba(26, 45, 74, 0.16);
            border-color: rgba(201, 169, 110, 0.3);
        }

        .img-box { width: 100%; height: 350px; background: var(--dark); overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; transition: transform 1.2s var(--cubic); }
        .press-card:hover img { transform: scale(1.05); }

        .press-body { padding: 1.8rem 2rem; }
        .press-date { font-size: 0.62rem; color: var(--gold); letter-spacing: 4px; font-weight: 600; text-transform: uppercase; margin-bottom: 0.6rem; display: block; }
        .press-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--teal2); font-weight: 600; line-height: 1.1; }

        /* LIGHTBOX */
        #lightbox {
            position: fixed; inset: 0; background: rgba(8, 16, 28, 0.97);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(16px);
        }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 88vw; max-height: 86vh; box-shadow: 0 40px 100px rgba(0,0,0,0.6); }
        .close-lb { position: absolute; top: 1.5rem; right: 1.5rem; color: var(--gold); font-size: 2rem; cursor: pointer; }

        footer { background: var(--dark); color: rgba(232, 237, 242, 0.35); text-align: center; padding: 2.5rem; font-size: 0.68rem; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <a href="index.html" class="logo">ATOUT VENT</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="archives.html">Archives</a></li>
            <li><a href="presse.html" style="color: #fff">Presse</a></li>
        </ul>
    </nav>

    <header id="hero">
        <canvas id="particles-js"></canvas>
        <div class="hero-content">
            <h1>Presse</h1>
            <span>REVUE MÉDIATIQUE & CRITIQUES</span>
        </div>
    </header>

    <main class="press-grid">
        <article class="press-card" onclick="openLB('concert pierre et le loup.jpg')">
            <div class="img-box"><img src="concert pierre et le loup.jpg" alt="Article Presse"></div>
            <div class="press-body">
                <span class="press-date">Septembre 2024</span>
                <h3 class="press-title">Un souffle magistral au Havre</h3>
            </div>
        </article>

        <article class="press-card" onclick="openLB('Affiche abbaye.png')">
            <div class="img-box"><img src="Affiche abbaye.png" alt="Critique Abbaye"></div>
            <div class="press-body">
                <span class="press-date">Juin 2025</span>
                <h3 class="press-title">Résonance sacrée à l'Abbaye</h3>
            </div>
        </article>
    </main>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <span class="close-lb">&times;</span>
        <img id="lb-img" src="" alt="Zoom Article">
    </div>

    <footer><p>© 2026 QUINTETTE ATOUT VENT — DESIGN INDUSTRIAL PREMIUM</p></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 45 },
                "color": { "value": "#c9a96e" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c9a96e", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        function openLB(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lb-img').src = src;
            lb.classList.add('active');
        }
    </script>
</body>
</html>
